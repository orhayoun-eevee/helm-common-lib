name: Validate Renovate Config

on:
  push:
    branches:
      - main
    paths:
      - 'renovate.json'
      - 'renovate.json5'
      - '.github/renovate.json'
      - '.github/renovate.json5'
      - '.github/workflows/renovate-config.yaml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: renovate-config-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    timeout-minutes: 15
    uses: orhayoun-eevee/build-workflow/.github/workflows/renovate-config.yaml@3a50b1646217b7f3e02feb0a7263af66a5cea2e2
