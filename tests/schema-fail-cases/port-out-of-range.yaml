# Test: Container port out of range
# Expected error: containerPort exceeds maximum
global:
  name: test-app
  namespace: test-namespace

workload:
  type: deployment
  spec:
    containers:
      app:
        enabled: true
        image:
          repository: nginx
          tag: "1.25"
        ports:
          - name: http
            containerPort: 99999
            protocol: TCP
