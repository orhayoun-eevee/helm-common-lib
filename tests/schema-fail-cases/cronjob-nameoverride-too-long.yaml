# Test: cronjob nameOverride exceeds 52 chars
global:
  name: test-app
  namespace: test-namespace
workload:
  type: cronJob
  spec:
    nameOverride: abcdefghijklmnopqrstuvwxyzabcdefghijklmnopqrstuvwxyzabc
    schedule: "0 * * * *"
    containers:
      app:
        enabled: true
        image:
          repository: busybox
          tag: "1.36"
