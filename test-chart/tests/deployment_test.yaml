# Unit tests for the Deployment template (from libChart), run via test-chart render.
# Rendered document order: 0=ServiceAccount, 1=Deployment, 2=PodDisruptionBudget, ...
suite: test deployment template
templates:
  - templates/all.yaml
tests:
  - it: should render Deployment with default replicas
    set:
      global:
        name: test-app
        namespace: test-namespace
      deployment:
        replicas: 1
        containers:
          app:
            enabled: true
            image:
              repository: nginx
              tag: "1.25"
    asserts:
      - documentIndex: 1
        equal:
          path: kind
          value: Deployment
      - documentIndex: 1
        equal:
          path: metadata.name
          value: test-app
      - documentIndex: 1
        equal:
          path: metadata.namespace
          value: test-namespace
      - documentIndex: 1
        equal:
          path: spec.replicas
          value: 1

  - it: should render with replicas override
    set:
      global:
        name: test-app
        namespace: default
      deployment:
        replicas: 3
        containers:
          app:
            enabled: true
            image:
              repository: nginx
              tag: latest
    asserts:
      - documentIndex: 1
        equal:
          path: spec.replicas
          value: 3

  - it: should render deployment with strategy and container ports
    set:
      global:
        name: snapshot-app
        namespace: snapshot-ns
      deployment:
        replicas: 2
        strategy:
          type: RollingUpdate
        containers:
          app:
            enabled: true
            image:
              repository: nginx
              tag: "1.25"
              pullPolicy: IfNotPresent
            ports:
              - name: http
                containerPort: 8080
                protocol: TCP
    asserts:
      - documentIndex: 1
        equal:
          path: spec.replicas
          value: 2
      - documentIndex: 1
        equal:
          path: spec.strategy.type
          value: RollingUpdate
      - documentIndex: 1
        equal:
          path: spec.template.spec.containers[0].image
          value: nginx:1.25

  - it: should render hostNetwork and host-network DNS policy defaults
    set:
      global:
        name: host-net-app
        namespace: default
      deployment:
        hostNetwork: true
        containers:
          app:
            enabled: true
            image:
              repository: nginx
              tag: latest
    asserts:
      - documentIndex: 1
        equal:
          path: spec.template.spec.hostNetwork
          value: true
      - documentIndex: 1
        equal:
          path: spec.template.spec.dnsPolicy
          value: ClusterFirstWithHostNet

  - it: should keep explicit dnsPolicy when hostNetwork is enabled
    set:
      global:
        name: host-net-custom-dns-app
        namespace: default
      deployment:
        hostNetwork: true
        dnsPolicy: None
        containers:
          app:
            enabled: true
            image:
              repository: nginx
              tag: latest
    asserts:
      - documentIndex: 1
        equal:
          path: spec.template.spec.hostNetwork
          value: true
      - documentIndex: 1
        equal:
          path: spec.template.spec.dnsPolicy
          value: None

  - it: should set serviceAccountName from explicit existing service account when create is false
    set:
      global:
        name: existing-sa-app
        namespace: default
      serviceAccount:
        create: false
        name: precreated-service-account
      deployment:
        containers:
          app:
            enabled: true
            image:
              repository: nginx
              tag: latest
    asserts:
      - documentIndex: 0
        equal:
          path: kind
          value: Deployment
      - documentIndex: 0
        equal:
          path: spec.template.spec.serviceAccountName
          value: precreated-service-account

  - it: should preserve explicit terminationGracePeriodSeconds zero
    set:
      global:
        name: zero-grace-app
        namespace: default
      deployment:
        terminationGracePeriodSeconds: 0
        containers:
          app:
            enabled: true
            image:
              repository: nginx
              tag: latest
    asserts:
      - documentIndex: 1
        equal:
          path: spec.template.spec.terminationGracePeriodSeconds
          value: 0
