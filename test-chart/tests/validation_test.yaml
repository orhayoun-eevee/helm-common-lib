# Template validation tests (business logic only).
# Structural checks (types, patterns, conditional-required, minProperties) are enforced by
# values.schema.json and tested via automated schema fail-case tests (make test-schema).
# These tests cover only what schema cannot express:
#   - deployment: at least one enabled container (iteration logic)
#   - cronJob: at least one enabled container + schedule/timezone guards
#   - PDB: mutual exclusivity with zero-value awareness (index + ne nil)
suite: test validation failures
templates:
  - templates/all.yaml
values:
  - fixtures/valid-base.yaml
tests:
  # ---- Deployment ----
  - it: should fail when no containers are enabled
    values:
      - fixtures/no-enabled-containers.yaml
    asserts:
      - failedTemplate:
          errorMessage: "deployment.containers must have at least one enabled container"

  # ---- PDB ----
  - it: should fail when PDB has both minAvailable and maxUnavailable set
    set:
      podDisruptionBudget.enabled: true
      podDisruptionBudget.minAvailable: 1
      podDisruptionBudget.maxUnavailable: 1
    asserts:
      - failedTemplate:
          errorMessage: "podDisruptionBudget.minAvailable and maxUnavailable are mutually exclusive (set only one)"

  - it: should fail when PDB is enabled but neither minAvailable nor maxUnavailable set
    set:
      podDisruptionBudget.enabled: true
      podDisruptionBudget.minAvailable: null
      podDisruptionBudget.maxUnavailable: null
    asserts:
      - failedTemplate:
          errorMessage: "podDisruptionBudget requires either minAvailable or maxUnavailable when enabled"

  - it: should render when PDB is enabled with only minAvailable set
    set:
      podDisruptionBudget.enabled: true
      podDisruptionBudget.minAvailable: 1
      podDisruptionBudget.maxUnavailable: null
    asserts:
      - hasDocuments:
          count: 3
      - documentIndex: 0
        equal:
          path: kind
          value: ServiceAccount

  - it: should render when PDB is enabled with minAvailable zero
    set:
      podDisruptionBudget.enabled: true
      podDisruptionBudget.minAvailable: 0
      podDisruptionBudget.maxUnavailable: null
    asserts:
      - hasDocuments:
          count: 3

  - it: should render when PDB is enabled with only maxUnavailable set
    set:
      podDisruptionBudget.enabled: true
      podDisruptionBudget.minAvailable: null
      podDisruptionBudget.maxUnavailable: 1
    asserts:
      - hasDocuments:
          count: 3

  - it: should render when PDB is enabled with percentage minAvailable
    set:
      podDisruptionBudget.enabled: true
      podDisruptionBudget.minAvailable: "50%"
      podDisruptionBudget.maxUnavailable: null
    asserts:
      - hasDocuments:
          count: 3

  - it: should render when PDB is disabled (skip validation)
    set:
      podDisruptionBudget.enabled: false
    asserts:
      - hasDocuments:
          count: 2

  # Aggregated multi-error output is validated by scripts/test-validation-aggregation.sh.
  # helm-unittest failedTemplate assertions are exact-match and can be brittle for multiline errors.

  # ---- CronJob ----
  - it: should fail when cronjob has no enabled containers
    set:
      workload:
        type: cronJob
      cronJob:
        schedule: "0 * * * *"
        containers:
          app:
            enabled: false
            image:
              repository: busybox
              tag: "1.36"
    asserts:
      - failedTemplate:
          errorMessage: "cronJob.containers must have at least one enabled container when workload.type=cronJob"

  - it: should fail when cronjob schedule uses CRON_TZ
    set:
      workload:
        type: cronJob
      cronJob:
        schedule: "CRON_TZ=UTC 0 * * * *"
        containers:
          app:
            enabled: true
            image:
              repository: busybox
              tag: "1.36"
    asserts:
      - failedTemplate:
          errorMessage: "cronJob.schedule must not use TZ/CRON_TZ; use cronJob.timeZone instead"

  - it: should fail when PDB is enabled for cronjob workload
    set:
      workload:
        type: cronJob
      podDisruptionBudget:
        enabled: true
        minAvailable: 1
        maxUnavailable: null
      cronJob:
        schedule: "0 * * * *"
        containers:
          app:
            enabled: true
            image:
              repository: busybox
              tag: "1.36"
    asserts:
      - failedTemplate:
          errorMessage: "podDisruptionBudget.enabled is only supported when workload.type=deployment"

  - it: should fail when service is enabled for cronjob workload
    set:
      workload:
        type: cronJob
      network:
        services:
          items:
            main:
              enabled: true
              type: ClusterIP
              ports:
                http:
                  port: 80
                  targetPort: 8080
                  protocol: TCP
      cronJob:
        schedule: "0 * * * *"
        containers:
          app:
            enabled: true
            image:
              repository: busybox
              tag: "1.36"
    asserts:
      - failedTemplate:
          errorMessage: "network.services.items.*.enabled is only supported when workload.type=deployment"
