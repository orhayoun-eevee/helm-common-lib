suite: test cronjob template
templates:
  - templates/all.yaml
tests:
  - it: should render CronJob when workload.type is cronJob
    set:
      global:
        name: test-cron
        namespace: test-namespace
      workload:
        type: cronJob
      cronJob:
        schedule: "*/15 * * * *"
        concurrencyPolicy: Forbid
        restartPolicy: OnFailure
        containers:
          app:
            enabled: true
            image:
              repository: busybox
              tag: "1.36"
            command: ["/bin/sh", "-c"]
            args: ["echo test"]
    asserts:
      - documentIndex: 1
        equal:
          path: kind
          value: CronJob
      - documentIndex: 1
        equal:
          path: spec.schedule
          value: "*/15 * * * *"
      - documentIndex: 1
        equal:
          path: spec.concurrencyPolicy
          value: Forbid
      - documentIndex: 1
        equal:
          path: spec.jobTemplate.spec.template.spec.restartPolicy
          value: OnFailure

  - it: should render hostNetwork dnsPolicy fallback for CronJob
    set:
      global:
        name: host-net-cron
        namespace: default
      workload:
        type: cronJob
      cronJob:
        schedule: "0 * * * *"
        hostNetwork: true
        containers:
          app:
            enabled: true
            image:
              repository: busybox
              tag: "1.36"
            command: ["/bin/sh", "-c"]
            args: ["echo test"]
    asserts:
      - documentIndex: 1
        equal:
          path: spec.jobTemplate.spec.template.spec.hostNetwork
          value: true
      - documentIndex: 1
        equal:
          path: spec.jobTemplate.spec.template.spec.dnsPolicy
          value: ClusterFirstWithHostNet

  - it: should truncate CronJob name to 52 characters
    set:
      global:
        name: abcdefghijklmnopqrstuvwxyzabcdefghijklmnopqrstuvwxyzabcdef
        namespace: default
      workload:
        type: cronJob
      cronJob:
        schedule: "0 * * * *"
        containers:
          app:
            enabled: true
            image:
              repository: busybox
              tag: "1.36"
            command: ["/bin/sh", "-c"]
            args: ["echo test"]
    asserts:
      - documentIndex: 1
        equal:
          path: metadata.name
          value: abcdefghijklmnopqrstuvwxyzabcdefghijklmnopqrstuvwxyz

  - it: should set serviceAccountName from explicit existing service account when create is false
    set:
      global:
        name: cron-existing-sa
        namespace: default
      serviceAccount:
        create: false
        name: existing-cron-sa
      workload:
        type: cronJob
      cronJob:
        schedule: "0 * * * *"
        containers:
          app:
            enabled: true
            image:
              repository: busybox
              tag: "1.36"
            command: ["/bin/sh", "-c"]
            args: ["echo test"]
    asserts:
      - documentIndex: 0
        equal:
          path: kind
          value: CronJob
      - documentIndex: 0
        equal:
          path: spec.jobTemplate.spec.template.spec.serviceAccountName
          value: existing-cron-sa

  - it: should preserve explicit terminationGracePeriodSeconds zero for cronjob
    set:
      global:
        name: cron-zero-grace
        namespace: default
      workload:
        type: cronJob
      cronJob:
        schedule: "0 * * * *"
        terminationGracePeriodSeconds: 0
        containers:
          app:
            enabled: true
            image:
              repository: busybox
              tag: "1.36"
            command: ["/bin/sh", "-c"]
            args: ["echo test"]
    asserts:
      - documentIndex: 1
        equal:
          path: spec.jobTemplate.spec.template.spec.terminationGracePeriodSeconds
          value: 0
